# Copilot Coding Agent -- Auto-Assign on Label
# When an issue receives the 'copilot' label, this workflow automatically assigns
# the Copilot Coding Agent to implement it. The agent reads .github/copilot-instructions.md
# for project conventions, creates a branch, implements the solution, and opens a PR.
#
# Prerequisites:
#   - Copilot Business/Enterprise seat on the repository owner account
#   - Copilot Coding Agent policy enabled in org/account settings
#   - 'copilot' label exists in the repository
#
# If the Copilot seat is not yet configured, the workflow posts a comment instead
# of failing silently.

name: Copilot Auto-Assign

on:
  issues:
    types: [labeled]

permissions:
  issues: write
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  assign-copilot:
    if: github.event.label.name == 'copilot'
    runs-on: ubuntu-latest
    steps:
      - name: Assign Copilot to issue
        uses: actions/github-script@v9
        with:
          script: |
            const issueNumber = context.issue.number;
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            try {
              await github.rest.issues.addAssignees({
                owner,
                repo,
                issue_number: issueNumber,
                assignees: ['copilot']
              });
              console.log(`Assigned Copilot to issue #${issueNumber}`);

              await github.rest.issues.addLabels({
                owner,
                repo,
                issue_number: issueNumber,
                labels: ['in-progress']
              });
            } catch (error) {
              console.log(`Could not assign Copilot: ${error.message}`);

              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: issueNumber,
                body: [
                  '**Copilot Coding Agent could not be assigned.**',
                  '',
                  'This usually means one of:',
                  '- The repository owner account does not have a Copilot Business/Enterprise seat',
                  '- The Copilot Coding Agent policy is not enabled in org/account settings',
                  '',
                  'To implement manually: open VS Code and ask Copilot Chat to work this issue.',
                  '',
                  `Error: \`${error.message}\``
                ].join('\n')
              });
            }
