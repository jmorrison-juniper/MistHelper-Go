# ================================================================
# Quality Gates -- Go CI required before auto-merge
# ================================================================
name: Quality Gates

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  issues: write

env:
  GO_VERSION: '1.25'
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  # ──────────────────────────────────────────────────────────────
  # STATIC ANALYSIS
  # ──────────────────────────────────────────────────────────────
  vet:
    name: "go vet"
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - run: go vet ./...

  # ──────────────────────────────────────────────────────────────
  # LINT
  # ──────────────────────────────────────────────────────────────
  golangci-lint:
    name: "golangci-lint"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: latest

  # ──────────────────────────────────────────────────────────────
  # BUILD
  # ──────────────────────────────────────────────────────────────
  build:
    name: "go build"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - run: go build ./...

  # ──────────────────────────────────────────────────────────────
  # TESTS + COVERAGE
  # ──────────────────────────────────────────────────────────────
  test:
    name: "go test"
    needs: [build]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Run tests with race detector and coverage
        run: go test ./... -race -cover -coverprofile=coverage.out -v
      - name: Upload coverage
        uses: actions/upload-artifact@v7
        with:
          name: coverage
          path: coverage.out

  # ──────────────────────────────────────────────────────────────
  # SECURITY -- gosec
  # ──────────────────────────────────────────────────────────────
  gosec:
    name: "gosec"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Install gosec
        run: go install github.com/securego/gosec/v2/cmd/gosec@latest
      - name: Run gosec
        run: gosec ./...

  # ──────────────────────────────────────────────────────────────
  # SECURITY -- govulncheck (dependency CVEs)
  # ──────────────────────────────────────────────────────────────
  govulncheck:
    name: "govulncheck"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest
      - name: Run govulncheck
        run: govulncheck ./...

  # ──────────────────────────────────────────────────────────────
  # FAILURE → GITHUB ISSUES (main branch only)
  # ──────────────────────────────────────────────────────────────
  create_failure_issues:
    name: "Create issues for failures"
    needs: [vet, golangci-lint, build, test, gosec, govulncheck]
    if: ${{ always() && github.ref == 'refs/heads/main' && contains(needs.*.result, 'failure') }}
    runs-on: ubuntu-latest
    permissions:
      issues: write
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6
      - name: Ensure issue labels exist
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh label create "bug" --color "d73a4a" --description "Something isn't working" 2>/dev/null || true
          gh label create "ci" --color "0e8a16" --description "CI/CD pipeline" 2>/dev/null || true
          gh label create "quality-gate" --color "fbca04" --description "Quality gate failure" 2>/dev/null || true
      - name: Create issues for each failed gate
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BRANCH: ${{ github.ref_name }}
          SHA: ${{ github.sha }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          declare -A RESULTS
          RESULTS[vet]="${{ needs.vet.result }}"
          RESULTS[golangci-lint]="${{ needs.golangci-lint.result }}"
          RESULTS[build]="${{ needs.build.result }}"
          RESULTS[test]="${{ needs.test.result }}"
          RESULTS[gosec]="${{ needs.gosec.result }}"
          RESULTS[govulncheck]="${{ needs.govulncheck.result }}"

          for gate in "${!RESULTS[@]}"; do
            result="${RESULTS[$gate]}"
            if [ "$result" = "failure" ]; then
              TITLE="CI: quality-gate \`${gate}\` failed"

              # Skip if an open issue already exists for this gate to avoid duplicates
              EXISTING=$(gh issue list --state open --search "CI: quality-gate ${gate} failed" --json number --jq 'length')
              if [ "$EXISTING" != "0" ]; then
                echo "Issue already exists for gate: ${gate} (skipping)"
                continue
              fi

              BODY="## Quality Gate Failure\n\n- Gate: \\`${gate}\\`\n- Branch: \\`${BRANCH}\\`\n- Commit: \\`${SHA}\\`\n- Run: ${RUN_URL}\n\n### Action Required\nReview the [workflow run](${RUN_URL}) for details.\n\n_Auto-generated by Quality Gates CI_"
              gh issue create \
                --title "$TITLE" \
                --label "bug,ci,quality-gate" \
                --body "$BODY"
              echo "Created issue for failed gate: ${gate}"
            fi
          done

  # ──────────────────────────────────────────────────────────────
  # SUCCESS → AUTO-CLOSE resolved quality-gate issues (main branch only)
  # ──────────────────────────────────────────────────────────────
  close_resolved_issues:
    name: "Close resolved quality-gate issues"
    needs: [vet, golangci-lint, build, test, gosec, govulncheck]
    if: ${{ always() && github.ref == 'refs/heads/main' }}
    runs-on: ubuntu-latest
    permissions:
      issues: write
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6
      - name: Close issues for passing gates
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          declare -A RESULTS
          RESULTS[vet]="${{ needs.vet.result }}"
          RESULTS[golangci-lint]="${{ needs.golangci-lint.result }}"
          RESULTS[build]="${{ needs.build.result }}"
          RESULTS[test]="${{ needs.test.result }}"
          RESULTS[gosec]="${{ needs.gosec.result }}"
          RESULTS[govulncheck]="${{ needs.govulncheck.result }}"

          for gate in "${!RESULTS[@]}"; do
            result="${RESULTS[$gate]}"
            if [ "$result" = "success" ]; then
              # Find and close any open issue for this gate
              ISSUE_NUMBERS=$(gh issue list --state open --search "CI: quality-gate ${gate} failed" --json number --jq '.[].number')
              for number in $ISSUE_NUMBERS; do
                gh issue close "$number" --comment "Quality gate \`${gate}\` is now passing. Auto-closed by CI."
                echo "Closed issue #${number} for gate: ${gate}"
              done
            fi
          done
