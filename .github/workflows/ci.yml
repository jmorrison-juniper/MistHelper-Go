# ================================================================
# Quality Gates -- Go CI required before auto-merge
# ================================================================
name: Quality Gates

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  issues: write

env:
  GO_VERSION: '1.24'
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  # ──────────────────────────────────────────────────────────────
  # STATIC ANALYSIS
  # ──────────────────────────────────────────────────────────────
  vet:
    name: "go vet"
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - run: go vet ./...

  # ──────────────────────────────────────────────────────────────
  # LINT
  # ──────────────────────────────────────────────────────────────
  golangci-lint:
    name: "golangci-lint"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: latest

  # ──────────────────────────────────────────────────────────────
  # BUILD
  # ──────────────────────────────────────────────────────────────
  build:
    name: "go build"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - run: go build ./...

  # ──────────────────────────────────────────────────────────────
  # TESTS + COVERAGE
  # ──────────────────────────────────────────────────────────────
  test:
    name: "go test"
    needs: [build]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Run tests with race detector and coverage
        run: go test ./... -race -cover -coverprofile=coverage.out -v
      - name: Upload coverage
        uses: actions/upload-artifact@v7
        with:
          name: coverage
          path: coverage.out

  # ──────────────────────────────────────────────────────────────
  # SECURITY -- gosec
  # ──────────────────────────────────────────────────────────────
  gosec:
    name: "gosec"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Install gosec
        run: go install github.com/securego/gosec/v2/cmd/gosec@latest
      - name: Run gosec
        run: gosec ./...

  # ──────────────────────────────────────────────────────────────
  # SECURITY -- govulncheck (dependency CVEs)
  # ──────────────────────────────────────────────────────────────
  govulncheck:
    name: "govulncheck"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest
      - name: Run govulncheck
        run: govulncheck ./...
